<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1280" />
<title>Telmo · Manual de Identidad de Marca</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Anton&family=Bebas+Neue&family=Oswald:wght@500;700&family=Inter:wght@400;500;600;700;900&family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Sans:wght@400;500;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="manual/styles.css" />
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="manual/tweaks-panel.jsx"></script>
<script type="text/babel" src="manual/tweaks.jsx"></script>
<script type="text/babel" src="manual/sections-a.jsx"></script>
<script type="text/babel" src="manual/sections-b.jsx"></script>
<script type="text/babel" src="manual/sections-c.jsx"></script>
<script type="text/babel" src="manual/app.jsx"></script>

<script type="text/babel">
  // Mount once all babel scripts have run
  const tryMount = () => {
    if (window.App && window.SectionIntro && window.SectionLogo && window.SectionSafe
        && window.SectionColor && window.SectionType && window.SectionIcon
        && window.SectionVoice && window.SectionApps && window.SectionMocks
        && window.SectionOutro && window.TweaksApp) {
      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<window.App />);
    } else {
      setTimeout(tryMount, 40);
    }
  };
  tryMount();
</script>
</body>
</html>
